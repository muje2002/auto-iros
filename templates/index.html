{% extends "base.html" %}
{% block title %}auto-iros - 등기부등본 자동 발급{% endblock %}

{% block content %}
<div class="text-center mb-10">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">등기부등본 자동 발급</h1>
    <p class="text-gray-500">CODEF API 기반 인터넷 등기소 자동화</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
    <!-- 단건 조회 -->
    <a href="/single" class="block p-6 bg-white dark:bg-gray-800 rounded-lg shadow hover:shadow-md transition border border-gray-100 dark:border-gray-700">
        <div class="text-2xl mb-2">📄</div>
        <h2 class="text-lg font-semibold text-gray-800 mb-1">단건 조회</h2>
        <p class="text-sm text-gray-500">주소 또는 고유번호로 등기부등본 1건 발급</p>
    </a>

    <!-- 일괄 조회 -->
    <a href="/batch" class="block p-6 bg-white dark:bg-gray-800 rounded-lg shadow hover:shadow-md transition border border-gray-100 dark:border-gray-700">
        <div class="text-2xl mb-2">📑</div>
        <h2 class="text-lg font-semibold text-gray-800 mb-1">일괄 조회</h2>
        <p class="text-sm text-gray-500">엑셀 파일 업로드로 여러 건 한번에 발급</p>
    </a>

    <!-- 주소 검색 -->
    <a href="/search" class="block p-6 bg-white dark:bg-gray-800 rounded-lg shadow hover:shadow-md transition border border-gray-100 dark:border-gray-700">
        <div class="text-2xl mb-2">🔍</div>
        <h2 class="text-lg font-semibold text-gray-800 mb-1">주소 검색</h2>
        <p class="text-sm text-gray-500">주소로 부동산 검색 (고유번호 확인)</p>
    </a>

    <!-- 템플릿 다운로드 -->
    <a href="/api/template/download" class="block p-6 bg-white dark:bg-gray-800 rounded-lg shadow hover:shadow-md transition border border-gray-100 dark:border-gray-700">
        <div class="text-2xl mb-2">📥</div>
        <h2 class="text-lg font-semibold text-gray-800 mb-1">템플릿 다운로드</h2>
        <p class="text-sm text-gray-500">일괄 조회용 엑셀 입력 양식 다운로드</p>
    </a>
</div>
{% endblock %}
